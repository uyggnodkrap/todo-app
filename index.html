<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 인증 섹션 -->
  <main id="auth-section" class="container">
    <h1>할 일 목록</h1>
    <div class="auth-box">
      <h2 id="auth-title">로그인</h2>
      <form id="auth-form">
        <input id="auth-email" type="email" placeholder="이메일" required autocomplete="email">
        <input id="auth-password" type="password" placeholder="비밀번호 (6자 이상)" required autocomplete="current-password">
        <button type="submit" id="auth-submit-btn">로그인</button>
      </form>
      <p id="auth-error" class="auth-error"></p>
      <p id="auth-message" class="auth-message"></p>
      <p class="auth-switch">
        <button id="auth-toggle-btn" type="button" class="auth-toggle-btn">회원가입하기</button>
      </p>
    </div>
  </main>

  <!-- 할 일 섹션 -->
  <main id="todo-section" class="container" style="display:none">
    <div class="todo-header">
      <h1>할 일 목록</h1>
      <div class="user-info">
        <span id="user-email" class="user-email"></span>
        <button id="logout-btn" class="logout-btn">로그아웃</button>
      </div>
    </div>

    <section class="input-section">
      <form id="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="할 일을 입력하세요..."
          autocomplete="off"
        >
        <button type="submit">추가</button>
      </form>
    </section>

    <section class="list-section">
      <p id="empty-message">아직 할 일이 없습니다.</p>
      <ul id="todo-list"></ul>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
  </script>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
